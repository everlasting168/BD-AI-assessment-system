const parsePhase = (phaseStr) => {
    if (!phaseStr)
      return "Unknown";
    const s = String(phaseStr).toLowerCase();
    if (s.includes("launch") || s.includes("market") || s.includes("approved"))
      return "Launched";
    if (s.includes("preclinical") || s.match(/\bind\b/) || s.includes("discovery"))
      return "Preclinical";
    if (s.includes("3") || s.includes("iii"))
      return "Phase 3";
    if (s.includes("2") || s.includes("ii"))
      return "Phase 2";
    if (s.includes("1") || s.includes("phase i") || s.match(/\b1\b/) || s.match(/\bi\b/))
      return "Phase 1";
    return "Unknown";
  };

const robustMatch = (str1, str2) => {
    if (!str1 || !str2)
      return false;
    const s1 = str1.toLowerCase().replace(/[^a-z0-9]/g, "");
    const s2 = str2.toLowerCase().replace(/[^a-z0-9]/g, "");
    if (s1.length < 4 || s2.length < 4)
      return s1 === s2;
    return s1.includes(s2) || s2.includes(s1);
  };
const generateIntegratedJSON = (gConfig, pipeAssets, mappedAssetsMap) => {
    const result = JSON.parse(JSON.stringify(gConfig));
    const processTargets = (targets) => {
      if (!targets)
        return;
      targets.forEach((t) => {
        const integrated = [];
        (t.drugs || []).forEach((d) => {
          const matchedAssets = pipeAssets.filter((a) => mappedAssetsMap[a.assetNAME] === d);
          if (matchedAssets.length > 0) {
            matchedAssets.forEach((a) => integrated.push(__spreadProps(__spreadValues({}, a), { _mappedOriginalPlaceholder: d })));
          } else {
            integrated.push({ isOriginalPlaceholder: true, name: d });
          }
        });
        t.integratedPipeline = integrated;
      });
    };
    result.cascadeNodes.forEach((n) => {
      processTargets(n.leftTargets);
      processTargets(n.rightTargets);
      processTargets(n.targets);
    });
    (result.floatingNodes || []).forEach((n) => {
      processTargets(n.targets);
    });
    return __spreadProps(__spreadValues({}, result), {
      _unmappedAssets: pipeAssets.filter((a) => !mappedAssetsMap[a.assetNAME])
    });
  };


const MiniPieChart = ({ items, size }) => {
  const counts = {};
  let total = 0;
  items.forEach(i => { counts[i.phase] = (counts[i.phase] || 0) + 1; total++; });
  if (total === 0) return null;
  let cum = 0;
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" className="rounded-full transform -rotate-90 shrink-0 border border-slate-300 shadow-sm ml-2 bg-white">
      {Object.keys(PhaseOrder).map(phase => {
        const c = counts[phase] || 0;
        if(c === 0) return null;
        const pct = c / total;
        const dasharray = `${pct * 100.53} 100.53`; // Circumference = 2*PI*16 = ~100.53
        const dashoffset = -cum * 100.53;
        cum += pct;
        return (
          <circle key={phase} r="16" cx="16" cy="16" fill="transparent" stroke={PhaseHex[phase]} strokeWidth="32" strokeDasharray={dasharray} strokeDashoffset={dashoffset} />
        );
      })}
    </svg>
  );
}


function ViewerApp() {
  const nodesRef = useRef(initialNodes);
  const linksRef = useRef(initialLinks);
  const isRunningRef = useRef(true);
  const isGridModeRef = useRef(initialGridMode);
  const animationRef = useRef(null);

  const [renderTick, setRenderTick] = useState(0);
  const [isRunning, setIsRunning] = useState(true);
  const [isGridMode, setIsGridMode] = useState(initialGridMode);
  const [view, setView] = useState(initialView);

  useEffect(() => { isRunningRef.current = isRunning; }, [isRunning]);
  useEffect(() => { isGridModeRef.current = isGridMode; }, [isGridMode]);

  const updatePhysics = (nodes, links) => {
    if (!isGridModeRef.current) {
       for (let i = 0; i < nodes.length; i++) {
         for (let j = i + 1; j < nodes.length; j++) {
           let dx = nodes[i].x - nodes[j].x; let dy = nodes[i].y - nodes[j].y;
           let distSq = dx*dx + dy*dy; if (distSq === 0) { dx = Math.random(); dy = Math.random(); distSq = 1; }
           let dist = Math.sqrt(distSq);
           let minDist = layoutConfig.boxWidth + 20; 
           if (dist < minDist) {
              let force = (minDist - dist) * 0.15;
              nodes[i].vx += (dx/dist)*force; nodes[i].vy += (dy/dist)*force;
              nodes[j].vx -= (dx/dist)*force; nodes[j].vy -= (dy/dist)*force;
           }
         }
       }
       links.forEach(link => {
         let n1 = nodes.find(n => n.id === link.source); let n2 = nodes.find(n => n.id === link.target);
         if (!n1 || !n2) return;
         let dx = n2.x - n1.x; let dy = n2.y - n1.y;
         let dist = Math.sqrt(dx*dx + dy*dy) || 1;
         let targetDist = link.type === 'spine' ? layoutConfig.spineSpacingY : layoutConfig.targetXOffset; 
         let force = (dist - targetDist) * 0.05; 
         n1.vx += (dx/dist)*force; n1.vy += (dy/dist)*force;
         n2.vx -= (dx/dist)*force; n2.vx -= (dy/dist)*force;
         if (link.type === 'spine') { n2.vy += 2.5; n1.vy -= 2.5; n1.vx += dx*0.05; n2.vx -= dx*0.05; }
       });
    }

    nodes.forEach(n => {
      if (n.isDragging || n.isPinned) { n.vx = 0; n.vy = 0; return; }
      if (isGridModeRef.current) {
         n.vx += (n.idealX - n.x) * 0.15;
         n.vy += (n.idealY - n.y) * 0.15;
         n.vx *= 0.65; n.vx *= 0.65;
      } else {
         n.vx *= 0.8; n.vx *= 0.8;
      }
      n.x += n.vx; n.y += n.vy;
    });
  };

  const physicsLoop = useCallback(() => {
    if (!isRunningRef.current) return;
    updatePhysics(nodesRef.current, linksRef.current);
    setRenderTick(t => t + 1);
    animationRef.current = requestAnimationFrame(physicsLoop);
  }, []);

  useEffect(() => {
    if (isRunning) animationRef.current = requestAnimationFrame(physicsLoop);
    return () => cancelAnimationFrame(animationRef.current);
  }, [isRunning, physicsLoop]);

  const handleCanvasPointerDown = (e) => {
    if (e.target.closest('.no-pan')) return;
    const startX = e.clientX; const startY = e.clientY;
    const initX = view.x; const initY = view.y;
    const onMove = (me) => setView(v => ({ ...v, x: initX + (me.clientX - startX), y: initY + (me.clientY - startY) }));
    const onUp = () => { window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); };
    window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
  };

  const handleNodePointerDown = (e, node) => {
    e.stopPropagation();
    node.isDragging = true;
    const startX = e.clientX; const startY = e.clientY;
    const initNx = node.x; const initNy = node.y;
    let hasDragged = false;
    const onMove = (me) => {
      if (Math.abs(me.clientX - startX) > 3 || Math.abs(me.clientY - startY) > 3) hasDragged = true;
      node.x = initNx + (me.clientX - startX) / view.k;
      node.y = initNy + (me.clientY - startY) / view.k;
      if (!isRunningRef.current) setRenderTick(t => t + 1);
    };
    const onUp = () => {
      node.isDragging = false;
      if (!hasDragged) node.isPinned = !node.isPinned;
      else node.isPinned = true;
      setRenderTick(t => t + 1);
      window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp);
    };
    window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
  };

  const toggleCollapse = (e, node) => {
    e.stopPropagation();
    node.isCollapsed = !node.isCollapsed;
    setRenderTick(t => t + 1);
  };

  return (
    <div className="flex flex-col h-screen bg-slate-50 font-sans overflow-hidden select-none relative">
      <header className="bg-slate-900 text-white px-6 py-3 shadow-md z-30 flex items-center justify-between shrink-0">
        <div className="flex items-center gap-3">
          <Activity className="w-5 h-5 text-emerald-400" />
          <h1 className="text-lg font-bold">{graphConfig.title || "Interactive Landscape Viewer"}</h1>
        </div>
        <div className="flex items-center gap-2">
          {/* Strict Grid button removed from export to prevent un-snapping bugs */}
          <button onClick={() => setIsRunning(!isRunning)} className="flex items-center gap-1.5 px-3 py-1.5 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm transition font-medium">
            {isRunning ? <Pause className="w-4 h-4"/> : <Play className="w-4 h-4"/>}
          </button>
        </div>
      </header>
      <main 
        className="flex-1 relative overflow-hidden bg-slate-50 cursor-grab active:cursor-grabbing"
        onPointerDown={handleCanvasPointerDown}
        onWheel={(e) => setView(v => ({ ...v, k: Math.min(Math.max(0.1, v.k - e.deltaY * 0.0015), 2.5) }))}
      >
        <div style={{ transform: "translate(" + view.x + "px, " + view.y + "px) scale(" + view.k + ")", transformOrigin: '0 0' }} className="absolute inset-0">
          <svg className="absolute inset-0 pointer-events-none" style={{ overflow: 'visible' }}>
            {linksRef.current.map((link, i) => {
              const s = nodesRef.current.find(n => n.id === link.source);
              const t = nodesRef.current.find(n => n.id === link.target);
              if (!s || !t) return null;
              const th = themes[s.theme] || themes.default;
              const pathData = link.type === 'spine' 
                ? "M " + s.x + " " + s.y + " L " + t.x + " " + t.y
                : "M " + s.x + " " + s.y + " C " + ((s.x + t.x)/2) + " " + s.y + ", " + ((s.x + t.x)/2) + " " + t.y + ", " + t.x + " " + t.y;
              return <path key={i} d={pathData} stroke={th.stroke} fill="none" strokeWidth={link.type === 'spine' ? layoutConfig.spineThickness : 2} strokeDasharray={link.type === 'branch' && !isGridMode ? "6 6" : "none"} className={"transition-colors " + (isGridMode ? 'opacity-40' : 'opacity-70')} strokeLinecap="round" strokeLinejoin="round" />
            })}
          </svg>
          {nodesRef.current.map(node => {
            const th = themes[node.theme] || themes.default;
            const isSpine = node.type === 'cascade';
            const nodeWidth = isSpine ? layoutConfig.boxWidth * 0.9 : layoutConfig.boxWidth;
            const textScale = layoutConfig.textScale;

            let combinedItems = [];
            let primaryItems = [];

            if (!isSpine) {
               const targetAssets = initialAssets.filter(a => (node.drugs || []).includes(initialMappedAssets[a.assetNAME]));
               const unmappedOriginals = (node.drugs || []).filter(d => !initialAssets.some(a => initialMappedAssets[a.assetNAME] === d));
               combinedItems = [
                  ...targetAssets.map(a => ({ name: initialMappedAssets[a.assetNAME], phase: parsePhase(a.developmentalPhase), isAsset: true, company: a.Company, target: a.NormalizedTarget || node.label, originalName: a.assetNAME })),
                  ...unmappedOriginals.map(d => ({ name: d, phase: "Unknown", isAsset: false, target: node.label }))
               ];
               combinedItems.sort((a, b) => (PhaseOrder[a.phase] || 99) - (PhaseOrder[b.phase] || 99));
            } else {
               const stage = graphConfig.cascadeNodes.find(n => n.id === node.id) || (graphConfig.floatingNodes||[]).find(n => n.id === node.id);
               if (stage) {
                 const allTargets = [...(stage.leftTargets||[]), ...(stage.rightTargets||[]), ...(stage.targets||[])];
                 allTargets.forEach(t => {
                    (t.drugs||[]).forEach(d => {
                       const targetAssets = initialAssets.filter(a => initialMappedAssets[a.assetNAME] === d);
                       if (targetAssets.length > 0) {
                          targetAssets.forEach(a => primaryItems.push({ phase: parsePhase(a.developmentalPhase) }));
                       } else {
                          primaryItems.push({ phase: "Unknown" });
                       }
                    });
                 });
               }
            }
            
            const displayCount = isSpine ? 0 : combinedItems.length;
            const isCollapsed = node.isCollapsed !== undefined ? node.isCollapsed : displayCount > 3;

            return (
              <div 
                key={node.id} onPointerDown={(e) => handleNodePointerDown(e, node)}
                className={"group absolute flex flex-col items-center justify-center bg-white/95 backdrop-blur cursor-grab active:cursor-grabbing transition-shadow " + 
                  (isSpine ? "p-4 rounded-2xl border-[5px] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.6)] hover:shadow-[0_25px_60px_-12px_rgba(0,0,0,0.8)] z-10 " + th.border : "p-3 rounded-xl border-2 shadow-md hover:shadow-xl z-0 " + th.border)
                }
                style={{ width: nodeWidth + "px", left: node.x, top: node.y, transform: 'translate(-50%, -50%)' }}
              >
                {!isSpine && displayCount > 0 && (
                  <div
                    onPointerDown={(e) => toggleCollapse(e, node)}
                    className={"absolute -top-3 -right-3 flex items-center justify-center gap-0.5 px-2 py-1 rounded-full shadow-lg z-20 cursor-pointer hover:scale-105 transition-transform border-2 border-white " + th.badge}
                    title="Toggle Assets"
                  >
                    <span className="font-bold leading-none" style={{ fontSize: (12 * textScale) + "px" }}>{displayCount}</span>
                    {isCollapsed ? <ChevronDown style={{ width: (12 * textScale) + "px", height: (12 * textScale) + "px" }} /> : <ChevronUp style={{ width: (12 * textScale) + "px", height: (12 * textScale) + "px" }} />}
                  </div>
                )}

                {isSpine ? (
                  <>
                    <h3 style={{ fontSize: (16 * textScale) + "px", lineHeight: 1.25 }} className={"font-bold text-center " + th.text}>{node.label}</h3>
                    
                    {primaryItems.length > 0 && (
                      <div className="mt-3 w-full border-t border-slate-200/60 pt-3 flex flex-col gap-1">
                         <h5 style={{ fontSize: (10 * textScale) + "px" }} className={"font-bold opacity-80 uppercase tracking-wider text-center mb-1 " + th.text}>Asset Distribution</h5>
                         {Object.keys(PhaseOrder).map(phase => {
                            const count = primaryItems.filter(i => i.phase === phase).length;
                            if (count === 0) return null;
                            const max = Math.max(...Object.keys(PhaseOrder).map(p => primaryItems.filter(i => i.phase === p).length));
                            const width = ((count / max) * 100) + "%";
                            return (
                              <div key={phase} className="flex items-center gap-2 w-full">
                                 <span style={{ fontSize: (9 * textScale) + "px" }} className="w-[30%] font-bold text-slate-500 truncate text-right leading-none shrink-0">{phase}</span>
                                 <div style={{ height: (8 * textScale) + "px" }} className="flex-1 bg-slate-100 rounded-sm overflow-hidden flex">
                                    <div style={{ width: width, backgroundColor: PhaseHex[phase] }} className="h-full rounded-sm"></div>
                                 </div>
                                 <span style={{ fontSize: (10 * textScale) + "px" }} className="w-4 text-left font-bold text-slate-700 leading-none shrink-0">{count}</span>
                              </div>
                            )
                         })}
                      </div>
                    )}
                  </>
                ) : (
                  <>
                    <h4 style={{ fontSize: (12 * textScale) + "px", lineHeight: 1.25 }} className={"font-bold uppercase mb-2 tracking-tight w-full text-left border-b pb-1 pr-6 border-opacity-30 flex items-center justify-between " + th.text + " " + th.border}>
                       <span>{node.label}</span>
                       <MiniPieChart items={combinedItems} size={16 * textScale} />
                    </h4>
                    
                    {!isCollapsed && (
                      <div className="flex flex-wrap gap-1 w-full justify-start mt-2">
                        {combinedItems.map((item, i) => (
                           <span 
                             key={node.id+"-drug-"+i+"-"+(item.originalName || item.name).replace(/\s+/g, '')} 
                             title={item.isAsset ? "Asset: " + item.originalName + "\nCompany: " + (item.company || "Unknown") + "\nTarget: " + item.target : item.name} 
                             style={{ fontSize: (10.5 * textScale) + "px" }} 
                             className={"px-1.5 py-0.5 rounded border font-semibold shadow-sm " + (PhaseColors[item.phase] || th.pill)}>
                              {item.name}
                           </span>
                        ))}
                      </div>
                    )}
                    
                    {isCollapsed && (
                      <div className="w-full text-left mt-2">
                        <span style={{ fontSize: `${10 * textScale}px` }} className={`text-slate-400 font-medium italic`}>... {displayCount} hidden</span>
                      </div>
                    )}
                  </>
                )}
              </div>
            );
          })}
        </div>
      </main>
    </div>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<ViewerApp />);
</script>
</body>
</html>
